# Local development stack: Postgres + pgvector, MinIO (S3-compatible storage)
# Usage: docker-compose up -d
# Full dev: ./dev.sh (starts Docker services + actor server + web app)

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: audiocomic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: audiocomic
      POSTGRES_PASSWORD: audiocomic
      POSTGRES_DB: audiocomic
    ports:
      - "5432:5432"
    volumes:
      - audiocomic-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audiocomic -d audiocomic"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: audiocomic-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web console
    environment:
      MINIO_ROOT_USER: audiocomic
      MINIO_ROOT_PASSWORD: audiocomic-dev
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Create the audiocomic bucket on first run
  minio-init:
    image: minio/mc:latest
    container_name: audiocomic-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 audiocomic audiocomic-dev &&
      mc mb local/audiocomic --ignore-existing &&
      echo 'Bucket audiocomic created'
      "
    restart: "no"

volumes:
  audiocomic-pgdata:
  minio-data:
